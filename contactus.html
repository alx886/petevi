<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Petevi Foam Insulation Ajax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <!-- Navbar Reusable -->
    <nav class="sticky top-0 z-50 bg-white shadow-md border-b border-slate-200">
        <div class="container mx-auto flex items-center justify-between p-4 lg:px-8">
            <a href="index.html">
                <img src="https://static.wixstatic.com/media/6c3a1c_d6c65b426d864a87af2f1281edee07d4~mv2.png" alt="Petevi Logo" class="h-10 md:h-12 w-auto">
            </a>
            <div class="hidden md:flex items-center gap-8 font-bold text-[#002d62]">
                <a href="aboutus.html" class="hover:text-[#004a99]">About Us</a>
                <a href="services.html" class="hover:text-[#004a99]">Services</a>
                <a href="projects.html" class="hover:text-[#004a99]">Projects</a>
                <a href="ourteam.html" class="hover:text-[#004a99]">Our Team</a>
                <a href="contactus.html" class="text-[#004a99] font-black">Contact Us</a>
            </div>
        </div>
    </nav>

    <main class="py-20">
        <div class="container mx-auto px-6 grid lg:grid-cols-2 gap-16">
            <div class="space-y-8">
                <h1 class="text-5xl font-black text-[#002d62] uppercase italic">Get in Touch</h1>
                <p class="text-xl text-slate-600 font-medium">Ready to seal your home? Our Ajax-based team responds to all inquiries within 24 hours.</p>
                
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <div class="p-4 bg-[#004a99] text-white rounded-2xl"><i data-lucide="phone"></i></div>
                        <div>
                            <p class="uppercase text-xs font-black text-slate-400">Call Us</p>
                            <p class="text-2xl font-black text-[#002d62]">647-393-3339</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="p-4 bg-[#ffbf00] text-[#002d62] rounded-2xl"><i data-lucide="mail"></i></div>
                        <div>
                            <p class="uppercase text-xs font-black text-slate-400">Email Us</p>
                            <p class="text-xl font-bold text-[#002d62]">edgar@petevifoaminsulation.com</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="p-4 bg-slate-900 text-white rounded-2xl"><i data-lucide="map-pin"></i></div>
                        <div>
                            <p class="uppercase text-xs font-black text-slate-400">Head Office</p>
                            <p class="text-lg font-bold text-[#002d62]">Greywardine Lane, Ajax, ON L1T 4V4</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-10 shadow-2xl">
                <form action="#" class="space-y-6">
                    <div>
                        <label class="block uppercase text-xs font-black text-slate-400 mb-2">Name</label>
                        <input type="text" class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-[#004a99]">
                    </div>
                    <div>
                        <label class="block uppercase text-xs font-black text-slate-400 mb-2">Email</label>
                        <input type="email" class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-[#004a99]">
                    </div>
                    <div>
                        <label class="block uppercase text-xs font-black text-slate-400 mb-2">Message</label>
                        <textarea rows="4" class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-[#004a99]"></textarea>
                    </div>
                    <button class="w-full bg-[#002d62] py-5 rounded-xl text-white font-black uppercase tracking-widest">Send Message</button>
                </form>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
